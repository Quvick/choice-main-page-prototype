<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choice - New Main Page</title>
  <style>
    :root {
      --black: #000000;
      --topbar: #1d1e1f;
      --surface: #2d2e2f;
      --surface-2: #3d3d3f;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.5);
      --dim: rgba(255, 255, 255, 0.35);
      --accent: #eb7353;
      --accent-hot: #ff5b00;
      --accent-deep: #8e2600;
      --content-top: 56px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-width: 0;
      height: 100%;
      min-height: 100%;
      background: var(--black);
    }

    body {
      overflow: hidden;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 680px;
      overflow: hidden;
      background: #000;
    }

    .ambient {
      position: absolute;
      inset: var(--content-top) 0 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 100%, rgba(255, 89, 0, 0.58) 0%, rgba(255, 89, 0, 0.25) 34%, rgba(0, 0, 0, 0) 68%),
        radial-gradient(circle at 50% 100%, rgba(255, 89, 0, 0.26) 0%, rgba(0, 0, 0, 0) 82%),
        #000;
    }

    .network-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.72;
      mix-blend-mode: screen;
      z-index: 1;
    }

    .topbar {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      width: 100%;
      height: var(--content-top);
      padding: 8px;
      background: var(--topbar);
      overflow: hidden;
    }

    .topbar-left,
    .topbar-right,
    .brand-group,
    .nav,
    .nav-item,
    .chip,
    .split-chip {
      display: flex;
      align-items: center;
    }

    .topbar-left {
      gap: 24px;
      min-width: 0;
    }

    .brand-group {
      gap: 24px;
      flex: 0 0 auto;
    }

    .spark-button {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: var(--surface);
      opacity: 0.78;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      height: 24px;
      width: 91px;
    }

    .brand-logo {
      display: block;
      width: 91px;
      height: 16px;
      object-fit: contain;
    }

    .nav {
      gap: 16px;
      min-width: 0;
    }

    .nav-item {
      gap: 4px;
      border: 0;
      padding: 0;
      background: transparent;
      color: #f2f3f6;
      font-size: 14px;
      font-weight: 700;
      line-height: 24px;
      white-space: nowrap;
    }

    .topbar-right {
      gap: 4px;
      flex: 0 0 auto;
    }

    .chip,
    .split-chip {
      height: 40px;
      border-radius: 8px;
      background: var(--surface);
      color: var(--white);
      font-size: 12px;
      font-weight: 800;
      line-height: 16px;
      white-space: nowrap;
    }

    .chip {
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      border: 2px solid var(--surface-2);
    }

    .split-chip {
      gap: 2px;
      padding: 2px;
      border: 0;
      background: var(--surface-2);
    }

    .split-main {
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border-radius: 6px;
      background: var(--surface);
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.05);
    }

    .split-icon {
      width: 28px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
    }

    .figma-icon {
      width: 24px;
      height: 24px;
      display: block;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .spark-button .figma-icon {
      height: 22px;
      opacity: 0.15;
    }

    .nav-chevron {
      width: 12px;
      height: 24px;
    }

    .workspace {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: stretch;
      gap: 8px;
      height: calc(100dvh - var(--content-top));
      min-height: 0;
      padding: 16px;
    }

    .sidebar,
    .right-rail {
      width: 256px;
      flex: 0 0 256px;
      min-height: 0;
      border-radius: 12px;
      background: rgba(23, 41, 74, 0.03);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0;
    }

    .new-chat {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      line-height: 16px;
      text-align: left;
    }

    .sidebar-label {
      width: 215px;
      margin: 0;
      padding: 0 12px;
      color: var(--dim);
      font-size: 13px;
      font-weight: 800;
      line-height: 24px;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      width: 100%;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      line-height: 16px;
    }

    .recent-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      padding: 12px;
      border-radius: 6px;
    }

    .recent-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .recent-time {
      flex: 0 0 auto;
      color: var(--dim);
      text-align: right;
    }

    .stage {
      flex: 1 1 auto;
      min-width: 0;
      display: grid;
      place-items: center;
      border-radius: 12px;
    }

    .conversation {
      width: min(641px, calc(100vw - 620px));
      min-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      transform: translateY(-28px);
    }

    .headline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: var(--white);
      font-size: 32px;
      font-weight: 500;
      line-height: 40px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      width: min(567px, 100%);
      margin: 0;
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: 0;
    }

    .chat-box {
      width: 100%;
      height: 140px;
      display: flex;
      flex-direction: column;
      padding: 2px;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.35);
      box-shadow:
        0 22px 68px rgba(0, 0, 0, 0.38),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(24px);
    }

    .prompt {
      width: 100%;
      height: 80px;
      resize: none;
      padding: 12px;
      border: 0;
      outline: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 500;
      line-height: 16px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.05);
    }

    .prompt::placeholder {
      color: rgba(255, 255, 255, 0.4);
      opacity: 1;
    }

    .prompt:focus {
      background: rgba(255, 255, 255, 0.13);
      box-shadow:
        0 0 24px rgba(0, 0, 0, 0.08),
        inset 0 0 0 1px rgba(235, 115, 83, 0.25);
    }

    .chat-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 56px;
      padding: 8px;
    }

    .round-button {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      padding: 8px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--white);
    }

    .send-button {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.2);
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .send-button.is-ready {
      background: rgba(235, 115, 83, 0.9);
      color: #160703;
      transform: translateY(-1px);
    }

    .right-rail {
      opacity: 0.34;
    }

    .screen-reader-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1240px) {
      .nav {
        gap: 12px;
      }

      .nav-item {
        font-size: 13px;
      }

      .conversation {
        width: min(641px, calc(100vw - 350px));
      }

      .right-rail {
        display: none;
      }
    }

    @media (max-width: 1040px) {
      .brand-group {
        gap: 14px;
      }

      .nav .nav-item:nth-last-child(-n + 3) {
        display: none;
      }

      .chip span {
        display: none;
      }

      .conversation {
        width: min(641px, calc(100vw - 326px));
      }
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 760px;
        height: auto;
      }

      .topbar {
        position: sticky;
        top: 0;
      }

      .nav {
        display: none;
      }

      .workspace {
        height: calc(100dvh - var(--content-top));
        min-height: 704px;
      }

      .sidebar {
        display: none;
      }

      .conversation {
        width: min(641px, calc(100vw - 32px));
        min-width: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 34px;
        white-space: normal;
      }

      .subtitle {
        font-size: 16px;
        line-height: 22px;
      }

    }

    @media (max-width: 560px) {
      .topbar {
        gap: 10px;
      }

      .brand,
      .brand-logo {
        width: 91px;
      }

      .spark-button {
        display: none;
      }

      .topbar-right .chip,
      .topbar-right .split-chip:first-of-type {
        display: none;
      }

      .workspace {
        padding: 16px 12px;
      }

      .conversation {
        gap: 28px;
        transform: translateY(-20px);
      }

      .chat-box {
        height: 148px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Choice assistant home">
    <div class="ambient" aria-hidden="true">
      <canvas class="network-bg"></canvas>
    </div>

    <header class="topbar">
      <div class="topbar-left">
        <div class="brand-group">
          <button class="spark-button" type="button" aria-label="AI tools">
            <img class="figma-icon" src="./assets/spark.svg" alt="">
          </button>
          <div class="brand" aria-label="Choice">
            <img class="brand-logo" src="./assets/logo.svg" alt="">
          </div>
        </div>
        <nav class="nav" aria-label="Main navigation">
          <button class="nav-item" type="button">Dashboard</button>
          <button class="nav-item" type="button">Menu <img class="figma-icon nav-chevron" src="./assets/sortdown.svg" alt=""></button>
          <button class="nav-item" type="button">Areas</button>
          <button class="nav-item" type="button">Settings <img class="figma-icon nav-chevron" src="./assets/sortdown.svg" alt=""></button>
          <button class="nav-item" type="button">Template</button>
          <button class="nav-item" type="button">Features</button>
          <button class="nav-item" type="button">Clients <img class="figma-icon nav-chevron" src="./assets/sortdown.svg" alt=""></button>
          <button class="nav-item" type="button">Loyality programs <img class="figma-icon nav-chevron" src="./assets/sortdown.svg" alt=""></button>
        </nav>
      </div>

      <div class="topbar-right" aria-label="View controls">
        <button class="chip" type="button">
          <img class="figma-icon" src="./assets/devices.svg" alt="">
          <span>App</span>
        </button>
        <button class="chip" type="button">
          <img class="figma-icon" src="./assets/browser.svg" alt="">
          <span>Site</span>
        </button>
        <button class="split-chip" type="button">
          <span class="split-main">Eng</span>
          <span class="split-icon"><img class="figma-icon" src="./assets/expand.svg" alt=""></span>
        </button>
        <button class="split-chip" type="button">
          <span class="split-main">DeJaVu</span>
          <span class="split-icon"><img class="figma-icon" src="./assets/menu.svg" alt=""></span>
        </button>
      </div>
    </header>

    <section class="workspace">
      <aside class="sidebar" aria-label="Recent chats">
        <button class="new-chat" type="button">
          <img class="figma-icon" src="./assets/newchat.svg" alt="">
          <span>New chat</span>
        </button>
        <p class="sidebar-label">Recents:</p>
        <ul class="recent-list">
          <li><span class="recent-title">Add Vegan Menu</span><span class="recent-time">1h</span></li>
          <li><span class="recent-title">Fix Delivery Area</span><span class="recent-time">12h</span></li>
          <li><span class="recent-title">Printer Not Working</span><span class="recent-time">12h</span></li>
          <li><span class="recent-title">Reservation Deposit refund for cl234</span><span class="recent-time">12h</span></li>
          <li><span class="recent-title">Why Orders Failed</span><span class="recent-time">12h</span></li>
          <li><span class="recent-title">Setup Google Tag</span><span class="recent-time">12h</span></li>
        </ul>
      </aside>

      <section class="stage" aria-label="Assistant prompt">
        <div class="conversation">
          <div class="headline">
            <h1>How can I <span>assist</span> you today?</h1>
            <p class="subtitle">Explain how something works? Add a new dish? Change settings?</p>
          </div>

          <form class="chat-box">
            <label class="screen-reader-only" for="prompt">Ask anything</label>
            <textarea id="prompt" class="prompt" placeholder="Ask anything" rows="3"></textarea>
            <div class="chat-actions">
              <button class="round-button" type="button" aria-label="Attach file">
                <img class="figma-icon" src="./assets/attach.svg" alt="">
              </button>
              <button class="round-button send-button" type="submit" aria-label="Send message" disabled>
                <img class="figma-icon" src="./assets/up.svg" alt="">
              </button>
            </div>
          </form>
        </div>
      </section>

      <aside class="right-rail" aria-hidden="true"></aside>
    </section>
  </main>

  <script>
    const form = document.querySelector(".chat-box");
    const prompt = document.querySelector(".prompt");
    const send = document.querySelector(".send-button");

    prompt.addEventListener("input", () => {
      const ready = prompt.value.trim().length > 0;
      send.disabled = !ready;
      send.classList.toggle("is-ready", ready);
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      prompt.focus();
    });

    (() => {
      const canvas = document.querySelector(".network-bg");
      const ambient = document.querySelector(".ambient");
      const ctx = canvas.getContext("2d", { alpha: true });
      const staticCanvas = document.createElement("canvas");
      const staticCtx = staticCanvas.getContext("2d", { alpha: true });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const yellowNodes = [];
      const nodes = [];
      const edges = [];
      const adjacency = new Map();
      let dpr = 1;
      let cssWidth = 0;
      let cssHeight = 0;
      let activeSignals = [];
      let animationFrame = 0;
      let nextBurstTimer = 0;

      function resizeCanvas() {
        const rect = ambient.getBoundingClientRect();
        cssWidth = Math.max(1, Math.round(rect.width));
        cssHeight = Math.max(1, Math.round(rect.height));
        dpr = Math.min(window.devicePixelRatio || 1, 1.25);
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
        staticCanvas.width = canvas.width;
        staticCanvas.height = canvas.height;
        canvas.style.width = `${cssWidth}px`;
        canvas.style.height = `${cssHeight}px`;
        buildNetwork();
        drawStaticLayer();
        drawFrame(performance.now());
      }

      function buildNetwork() {
        nodes.length = 0;
        edges.length = 0;
        yellowNodes.length = 0;
        adjacency.clear();

        const colStep = 45;
        const rowStep = 39;
        const rows = Math.ceil(cssHeight / rowStep) + 3;
        const cols = Math.ceil(cssWidth / colStep) + 3;

        for (let row = 0; row < rows; row += 1) {
          for (let col = 0; col < cols; col += 1) {
            const x = col * colStep + (row % 2 ? colStep / 2 : 0) - colStep;
            const y = row * rowStep - rowStep / 2;
            const isWarm = row % 2 === 0 && col % 4 === 1;
            const node = { id: nodes.length, row, col, x, y, isWarm };
            nodes.push(node);
            adjacency.set(node.id, []);
            if (isWarm && x > -10 && x < cssWidth + 10 && y > -10 && y < cssHeight + 10) {
              yellowNodes.push(node);
            }
          }
        }

        for (let i = 0; i < nodes.length; i += 1) {
          for (let j = i + 1; j < nodes.length; j += 1) {
            const a = nodes[i];
            const b = nodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            if (Math.abs(dx) > 47 || Math.abs(dy) > 41) {
              continue;
            }
            const distance = Math.hypot(dx, dy);
            if (distance > 38 && distance < 47) {
              edges.push([a, b]);
              adjacency.get(a.id).push(b);
              adjacency.get(b.id).push(a);
            }
          }
        }
      }

      function drawStaticLayer() {
        staticCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        staticCtx.clearRect(0, 0, cssWidth, cssHeight);
        staticCtx.lineWidth = 1;
        staticCtx.strokeStyle = "rgba(255, 89, 0, 0.035)";
          staticCtx.beginPath();
          for (const [a, b] of edges) {
            staticCtx.moveTo(a.x, a.y);
            staticCtx.lineTo(b.x, b.y);
          }
          staticCtx.stroke();

        for (const node of nodes) {
            if (node.x < -4 || node.x > cssWidth + 4 || node.y < -4 || node.y > cssHeight + 4) {
              continue;
            }
            staticCtx.beginPath();
          staticCtx.fillStyle = node.isWarm ? "rgba(255, 89, 0, 0.18)" : "rgba(255, 89, 0, 0.14)";
            staticCtx.arc(node.x, node.y, node.isWarm ? 2.15 : 1.6, 0, Math.PI * 2);
            staticCtx.fill();
          }
      }

      function drawFrame(now) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(staticCanvas, 0, 0);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        activeSignals = activeSignals.filter((signal) => {
          const elapsed = now - signal.start;
          if (elapsed >= signal.duration) {
            return false;
          }
          if (elapsed >= 0) {
            drawSignal(signal, elapsed);
          }
          return true;
        });

        if (activeSignals.length > 0) {
          animationFrame = requestAnimationFrame(drawFrame);
        } else {
          animationFrame = 0;
        }
      }

      function drawSignal(signal, elapsed) {
        const points = signal.path;
        const segmentCount = points.length - 1;

        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = 1.45;

        for (let i = 0; i < segmentCount; i += 1) {
          const segmentElapsed = elapsed - i * signal.segmentDelay;
          if (segmentElapsed <= 0 || segmentElapsed >= signal.segmentDuration) {
            continue;
          }

          const opacity = getSegmentOpacity(segmentElapsed, signal) * 0.35;
          const a = points[i];
          const b = points[i + 1];
          ctx.strokeStyle = `rgba(255, 89, 0, ${opacity})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();

          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 116, 42, ${opacity * 0.7})`;
          ctx.arc(a.x, a.y, 2.1, 0, Math.PI * 2);
          ctx.arc(b.x, b.y, 2.1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function getSegmentOpacity(elapsed, signal) {
        if (elapsed < signal.riseDuration) {
          return easeOutCubic(elapsed / signal.riseDuration);
        }

        const fadeProgress = clamp((elapsed - signal.riseDuration) / signal.fadeDuration, 0, 1);
        return Math.pow(1 - fadeProgress, 1.6);
      }

      function startBurst() {
        if (prefersReducedMotion || yellowNodes.length === 0) {
          return;
        }

        const origin = yellowNodes[Math.floor(Math.random() * yellowNodes.length)];
        const branches = 3 + Math.floor(Math.random() * 3);
        const firstSteps = getDiverseStartNodes(origin, branches);
        const startedAt = performance.now();

        for (let i = 0; i < branches; i += 1) {
          const maxSteps = 2 + Math.floor(Math.random() * 15);
          const path = firstSteps[i]
            ? buildSignalPath(origin, maxSteps, firstSteps[i])
            : buildSignalPath(origin, maxSteps);
          if (path.length > 1) {
            const segmentCount = path.length - 1;
            const riseDuration = 160 + Math.random() * 30;
            const fadeDuration = 2678 + Math.random() * 494;
            const segmentDuration = riseDuration + fadeDuration;
            const segmentDelay = segmentCount > 1 ? 56 : 0;
            activeSignals.push({
              path,
              start: startedAt + i * 54,
              riseDuration,
              fadeDuration,
              segmentDuration,
              segmentDelay,
              duration: segmentDuration + segmentDelay * (segmentCount - 1) + 40
            });
          }
        }

        if (!animationFrame) {
          animationFrame = requestAnimationFrame(drawFrame);
        }

        scheduleBurst();
      }

      function getDiverseStartNodes(origin, count) {
        const neighbors = adjacency.get(origin.id) || [];
        if (neighbors.length <= 3) {
          return shuffleNodes(neighbors).slice(0, count);
        }

        const sorted = neighbors
          .map((node) => ({
            node,
            angle: Math.atan2(node.y - origin.y, node.x - origin.x)
          }))
          .sort((a, b) => a.angle - b.angle);
        const starts = [];
        const step = sorted.length / Math.min(count, sorted.length);

        for (let i = 0; i < count && i < sorted.length; i += 1) {
          const index = Math.floor((i * step + Math.random() * 0.45) % sorted.length);
          const candidate = sorted[index].node;
          if (!starts.some((node) => node.id === candidate.id)) {
            starts.push(candidate);
          }
        }

        for (const { node } of sorted) {
          if (starts.length >= count) {
            break;
          }
          if (!starts.some((start) => start.id === node.id)) {
            starts.push(node);
          }
        }

        return starts;
      }

      function buildSignalPath(origin, maxSteps, firstStep) {
        const path = [origin];
        const visited = new Set([origin.id]);
        let current = origin;

        if (firstStep && !visited.has(firstStep.id)) {
          path.push(firstStep);
          visited.add(firstStep.id);
          current = firstStep;
        }

        for (let step = path.length - 1; step < maxSteps; step += 1) {
          const choices = adjacency.get(current.id).filter((node) => !visited.has(node.id));
          if (choices.length === 0) {
            break;
          }
          const next = choices[Math.floor(Math.random() * choices.length)];
          path.push(next);
          visited.add(next.id);
          current = next;
        }

        return path;
      }

      function shuffleNodes(nodes) {
        const shuffled = nodes.slice();
        for (let i = shuffled.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      function scheduleBurst() {
        window.clearTimeout(nextBurstTimer);
        nextBurstTimer = window.setTimeout(startBurst, 4200 + Math.random() * 3800);
      }

      function pointOnPath(points, progress) {
        const scaled = clamp(progress, 0, 0.999) * (points.length - 1);
        const index = Math.floor(scaled);
        const local = scaled - index;
        const a = points[index];
        const b = points[index + 1] || a;
        return { x: lerp(a.x, b.x, local), y: lerp(a.y, b.y, local) };
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function lerp(a, b, value) {
        return a + (b - a) * value;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas, { passive: true });
      if (!prefersReducedMotion) {
        window.setTimeout(startBurst, 900);
      }
    })();
  </script>
</body>
